current_phase: "C — CERRADA"
current_focus: >-
  Iniciativa cerrada 2026-07-23. Aura IA completa: un asistente conversacional
  in-app con tres capas. A (analista read-only, ADR 0051): chat con grounding
  (toda cifra viene de un tool-call), RLS caller-scoped como sandbox, Gemini
  tras LlmProvider agnostico. B (captura, ADR 0052): describir un movimiento
  devuelve un borrador editable; el modelo NUNCA escribe, el cliente escribe
  tras confirmar. C (curador, ADR 0053): sugerencia en vivo sin modelo en el
  formulario, y un pase en lote que recategoriza el historial (el modelo propone
  descripcion+categoria, cada cifra la mide el servidor), revisable en hoja
  apilada, reversible entero, con entrada desde el chat y desde Ajustes.
next_action: >-
  Ninguna -- cerrada. Residuo permanente en ADRs 0051-0053 + spec §15/§16. Los
  gates en device cazaron los bugs de mayor valor (desenvuelto de validateMap en
  C1, replay de idempotencia en C3), sostenidos ahora por tests de datasource y
  cubit. Fast-follows NO comprometidos: token streaming, tarjetas ricas (trend),
  y la promocion del borrador a capa compartida vive en la iniciativa aparte
  'Automatic Transaction Capture' (BACKLOG, docs/specs/transaction-capture.md).
